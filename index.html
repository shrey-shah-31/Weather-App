<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Hourly & Daily Forecast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.5s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #2d3436;
            margin-bottom: 25px;
            font-size: 2.5em;
            font-weight: 300;
        }

        .search-section {
            max-width: 500px;
            margin: 0 auto 20px auto;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background: #f8f9fa;
        }

        input[type="text"]:focus {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        button {
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00b894, #00a085);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 184, 148, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.4);
        }

        /* History */
        .history-section {
            margin-top: 5px;
            margin-bottom: 20px;
            text-align: left;
        }
        .history-title {
            font-size: 0.85rem;
            color: #636e72;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-item {
            background: rgba(0, 184, 148, 0.15);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #00a085;
        }
        .history-item:hover {
            background: #00b894;
            color: white;
        }
        .clear-history {
            background: none;
            border: none;
            color: #e17055;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 2px 8px;
            margin-left: auto;
        }
        .clear-history:hover {
            background: rgba(225, 112, 85, 0.1);
            border-radius: 20px;
        }

        /* Current Weather */
        .current-weather {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .city-name {
            font-size: 2.5rem;
            font-weight: 600;
            color: #2d3436;
        }
        .temp {
            font-size: 4rem;
            font-weight: 300;
            color: #2d3436;
        }
        .weather-icon {
            font-size: 3.5rem;
            margin: 10px 0;
        }
        .description {
            font-size: 1.3rem;
            text-transform: capitalize;
            color: #636e72;
        }
        .details {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }
        .detail-card {
            background: rgba(0,0,0,0.05);
            padding: 10px 20px;
            border-radius: 30px;
        }

        /* Forecast Sections */
        .forecast-section {
            margin-top: 30px;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 15px;
            color: #2d3436;
            border-left: 5px solid #00b894;
            padding-left: 15px;
        }
        .hourly-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 5px;
            scrollbar-width: thin;
        }
        .hourly-card {
            min-width: 100px;
            background: rgba(255,255,255,0.7);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        .daily-card {
            background: rgba(255,255,255,0.7);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        .day-name {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .temp-range {
            font-size: 1rem;
            margin-top: 8px;
        }
        .high {
            color: #e67e22;
            font-weight: bold;
        }
        .low {
            color: #3498db;
        }

        .error, .loading {
            text-align: center;
            margin: 20px;
        }
        .error {
            color: #e17055;
            display: none;
        }
        .loading {
            display: none;
            color: #00b894;
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            .hourly-card { min-width: 80px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-cloud-sun"></i> Weather Forecast</h1>
        
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
                <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
            </div>
            <div class="history-section">
                <div class="history-title">
                    <i class="fas fa-history"></i> Recent Searches
                    <button class="clear-history" id="clearHistoryBtn">Clear All</button>
                </div>
                <div class="history-list" id="historyList">
                    <span style="color: #b2bec3;">No history yet</span>
                </div>
            </div>
        </div>

        <div class="loading" id="loading"><i class="fas fa-spinner fa-spin"></i> Fetching weather...</div>
        <div class="error" id="error">City not found! Please check spelling.</div>

        <!-- Current Weather -->
        <div id="currentWeather" style="display: none;">
            <div class="current-weather">
                <div class="city-name" id="cityName"></div>
                <div class="temp" id="currentTemp"></div>
                <div class="weather-icon" id="currentIcon"></div>
                <div class="description" id="currentDesc"></div>
                <div class="details">
                    <div class="detail-card"><i class="fas fa-tint"></i> Humidity: <span id="humidity"></span>%</div>
                    <div class="detail-card"><i class="fas fa-wind"></i> Wind: <span id="windSpeed"></span> m/s</div>
                </div>
            </div>
        </div>

        <!-- Hourly Forecast -->
        <div class="forecast-section" id="hourlySection" style="display: none;">
            <div class="section-title"><i class="fas fa-clock"></i> Hourly Forecast (3-hour steps)</div>
            <div class="hourly-scroll" id="hourlyContainer"></div>
        </div>

        <!-- Daily Forecast -->
        <div class="forecast-section" id="dailySection" style="display: none;">
            <div class="section-title"><i class="fas fa-calendar-week"></i> 7-Day Forecast</div>
            <div class="daily-grid" id="dailyContainer"></div>
        </div>
    </div>

    <script>
        // ---------- API CONFIG ----------
        const API_KEY = '9477ed8eda5d46a0ad74324cfadc20c5';
        const CURRENT_URL = 'https://api.openweathermap.org/data/2.5/weather';
        const FORECAST_URL = 'https://api.openweathermap.org/data/2.5/forecast';

        // ---------- HISTORY (localStorage) ----------
        const HISTORY_KEY = 'weatherSearchHistory';
        const MAX_HISTORY = 5;

        function getHistory() {
            const stored = localStorage.getItem(HISTORY_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function saveToHistory(city) {
            if (!city) return;
            let history = getHistory();
            history = history.filter(c => c.toLowerCase() !== city.toLowerCase());
            history.unshift(city);
            if (history.length > MAX_HISTORY) history.pop();
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistory();
        }

        function clearHistory() {
            localStorage.removeItem(HISTORY_KEY);
            renderHistory();
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            const history = getHistory();
            if (history.length === 0) {
                historyList.innerHTML = '<span style="color: #b2bec3;">No history yet</span>';
                return;
            }
            historyList.innerHTML = history.map(city => 
                `<span class="history-item" onclick="searchFromHistory('${city.replace(/'/g, "\\'")}')">
                    <i class="fas fa-search-location"></i> ${escapeHtml(city)}
                </span>`
            ).join('');
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function searchFromHistory(city) {
            document.getElementById('cityInput').value = city;
            fetchAllWeather(city);
        }

        // ---------- Helper: Clear UI ----------
        function clearUI() {
            document.getElementById('currentWeather').style.display = 'none';
            document.getElementById('hourlySection').style.display = 'none';
            document.getElementById('dailySection').style.display = 'none';
            document.getElementById('error').style.display = 'none';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(msg) {
            const errDiv = document.getElementById('error');
            errDiv.textContent = msg || 'City not found!';
            errDiv.style.display = 'block';
            showLoading(false);
            clearUI();
        }

        // ---------- Format date/time ----------
        function formatHour(dt_txt) {
            // dt_txt: "2025-04-02 12:00:00"
            const date = new Date(dt_txt);
            let hours = date.getHours();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            return `${hours} ${ampm}`;
        }

        function getDayName(dateStr) {
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const d = new Date(dateStr);
            return days[d.getDay()];
        }

        // ---------- Fetch Current + Forecast ----------
        async function fetchAllWeather(city) {
            if (!city) return;
            clearUI();
            showLoading(true);
            try {
                // 1. Current weather
                const currentRes = await fetch(`${CURRENT_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`);
                if (!currentRes.ok) throw new Error('City not found');
                const currentData = await currentRes.json();
                
                // 2. Forecast (5 days / 3-hour)
                const forecastRes = await fetch(`${FORECAST_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`);
                if (!forecastRes.ok) throw new Error('Forecast unavailable');
                const forecastData = await forecastRes.json();
                
                // Display current
                displayCurrent(currentData);
                // Display hourly (next 24 hours = 8 entries)
                displayHourly(forecastData.list.slice(0, 8));
                // Display daily (group by day)
                displayDaily(forecastData.list);
                
                // Save to history only on success
                saveToHistory(city);
                // Change background based on current weather
                changeBackground(currentData.weather[0].main);
                
            } catch (err) {
                showError(err.message);
            } finally {
                showLoading(false);
            }
        }

        function displayCurrent(data) {
            document.getElementById('cityName').innerText = `${data.name}, ${data.sys.country}`;
            document.getElementById('currentTemp').innerHTML = `${Math.round(data.main.temp)}°C`;
            document.getElementById('currentDesc').innerText = data.weather[0].description;
            document.getElementById('humidity').innerText = data.main.humidity;
            document.getElementById('windSpeed').innerText = data.wind.speed;
            const iconClass = getWeatherIcon(data.weather[0].main);
            document.getElementById('currentIcon').innerHTML = `<i class="${iconClass}" style="font-size: 3rem;"></i>`;
            document.getElementById('currentWeather').style.display = 'block';
        }

        function displayHourly(hourlyList) {
            const container = document.getElementById('hourlyContainer');
            container.innerHTML = '';
            hourlyList.forEach(item => {
                const time = formatHour(item.dt_txt);
                const temp = Math.round(item.main.temp);
                const icon = getWeatherIcon(item.weather[0].main);
                const card = document.createElement('div');
                card.className = 'hourly-card';
                card.innerHTML = `
                    <div>${time}</div>
                    <i class="${icon}"></i>
                    <div><strong>${temp}°C</strong></div>
                `;
                container.appendChild(card);
            });
            document.getElementById('hourlySection').style.display = 'block';
        }

        function displayDaily(forecastList) {
            // Group by date (YYYY-MM-DD)
            const dailyMap = new Map();
            forecastList.forEach(item => {
                const date = item.dt_txt.split(' ')[0];
                if (!dailyMap.has(date)) {
                    dailyMap.set(date, {
                        temps: [item.main.temp],
                        weather: item.weather[0].main,
                        icon: item.weather[0].main
                    });
                } else {
                    dailyMap.get(date).temps.push(item.main.temp);
                }
            });
            // Convert to array and take first 7 days
            const dailyArray = Array.from(dailyMap.entries()).slice(0, 7);
            const container = document.getElementById('dailyContainer');
            container.innerHTML = '';
            dailyArray.forEach(([date, data]) => {
                const minTemp = Math.min(...data.temps);
                const maxTemp = Math.max(...data.temps);
                const dayName = getDayName(date);
                const icon = getWeatherIcon(data.icon);
                const card = document.createElement('div');
                card.className = 'daily-card';
                card.innerHTML = `
                    <div class="day-name">${dayName}</div>
                    <i class="${icon}" style="font-size: 1.8rem;"></i>
                    <div class="temp-range">
                        <span class="high">${Math.round(maxTemp)}°</span> / 
                        <span class="low">${Math.round(minTemp)}°</span>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('dailySection').style.display = 'block';
        }

        function getWeatherIcon(main) {
            const map = {
                'Thunderstorm': 'fas fa-bolt', 'Drizzle': 'fas fa-cloud-rain',
                'Rain': 'fas fa-cloud-showers-heavy', 'Snow': 'fas fa-snowflake',
                'Clear': 'fas fa-sun', 'Clouds': 'fas fa-cloud',
                'Mist': 'fas fa-smog', 'Smoke': 'fas fa-smog', 'Haze': 'fas fa-smog',
                'Dust': 'fas fa-wind', 'Fog': 'fas fa-smog'
            };
            return map[main] || 'fas fa-cloud-sun';
        }

        function changeBackground(weatherMain) {
            const w = weatherMain.toLowerCase();
            document.body.className = '';
            if (w === 'clear') document.body.classList.add('clear');
            else if (w === 'clouds') document.body.classList.add('cloudy');
            else if (w === 'rain' || w === 'drizzle') document.body.classList.add('rainy');
            else if (w === 'snow') document.body.classList.add('snowy');
            else document.body.classList.add('clear');
        }

        // ---------- Event Listeners & Page Load ----------
        document.getElementById('searchBtn').addEventListener('click', () => {
            const city = document.getElementById('cityInput').value.trim();
            if (city) fetchAllWeather(city);
            else showError('Please enter a city name');
        });
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = document.getElementById('cityInput').value.trim();
                if (city) fetchAllWeather(city);
                else showError('Please enter a city name');
            }
        });
        document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);

        // On load: show history but do NOT auto-search
        window.addEventListener('DOMContentLoaded', () => {
            renderHistory();
            // Optional: set a placeholder demo? No, keep empty.
            document.getElementById('cityInput').value = '';
            clearUI();
        });
    </script>
</body>
</html>
