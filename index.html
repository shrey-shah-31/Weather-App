<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App – Backend Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.5s ease;
        }

        /* Weather-based backgrounds (added for dynamic change) */
        body.sunny { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); }
        body.cloudy { background: linear-gradient(135deg, #bdc3c7 0%, #95a5a6 100%); }
        body.rainy { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }
        body.snowy { background: linear-gradient(135deg, #ecf0f1 0%, #bdc3c7 100%); }
        body.clear { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 20px;
            color: #2d3436;
            font-weight: 300;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: #f8f9fa;
            outline: none;
            font-size: 16px;
        }

        input:focus {
            background: white;
            box-shadow: 0 0 0 2px #00b894;
        }

        button {
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            background: #00b894;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover {
            background: #019874;
            transform: translateY(-2px);
        }

        .loading {
            display: none;
            margin: 20px 0;
            font-size: 1.2rem;
            color: #00b894;
        }

        .weather-info {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .city {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2d3436;
        }

        .temp {
            font-size: 3rem;
            font-weight: 300;
            margin: 10px 0;
        }

        .weather-icon {
            font-size: 3rem;
            margin: 10px 0;
        }

        .description {
            font-size: 1.2rem;
            text-transform: capitalize;
            color: #636e72;
            margin-bottom: 20px;
        }

        .details {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .detail {
            background: rgba(0, 0, 0, 0.05);
            padding: 10px;
            border-radius: 15px;
            width: 45%;
        }

        .detail i {
            font-size: 1.5rem;
            color: #00b894;
        }

        .error {
            color: #e17055;
            background: rgba(225, 112, 85, 0.1);
            padding: 10px;
            border-radius: 10px;
            display: none;
            margin-top: 15px;
        }

        @media (max-width: 480px) {
            .container { padding: 20px; }
            .temp { font-size: 2.5rem; }
        }
    </style>
</head>
<body class="clear">
<div class="container">
    <h1><i class="fas fa-cloud-sun"></i> Weather App</h1>

    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
        <button onclick="getWeather()"><i class="fas fa-search"></i> Search</button>
    </div>

    <div class="loading" id="loading">
        <i class="fas fa-spinner fa-spin"></i> Fetching weather...
    </div>

    <div class="error" id="error"></div>

    <div class="weather-info" id="weatherInfo">
        <div class="city" id="city"></div>
        <div class="temp" id="temp"></div>
        <div class="weather-icon" id="weatherIcon"></div>
        <div class="description" id="description"></div>
        <div class="details">
            <div class="detail">
                <i class="fas fa-tint"></i>
                <div><span id="humidity">-</span>%</div>
                <small>Humidity</small>
            </div>
            <div class="detail">
                <i class="fas fa-wind"></i>
                <div><span id="wind">-</span> m/s</div>
                <small>Wind Speed</small>
            </div>
        </div>
    </div>
</div>

<script>
    // ✅ Backend endpoint (your PHP script)
    const BACKEND_URL = 'get_weather.php';

    window.onload = function() {
        // Start fresh – no previous city
        document.getElementById('cityInput').value = '';
        document.getElementById('weatherInfo').style.display = 'none';
        document.getElementById('error').style.display = 'none';
        document.getElementById('loading').style.display = 'none';
    };

    async function getWeather() {
        const cityInput = document.getElementById('cityInput').value.trim();
        
        if (!cityInput) {
            showError('Please enter a city name!');
            return;
        }

        // Clear previous data & show loading
        clearWeatherDisplay();
        document.getElementById('loading').style.display = 'block';
        document.getElementById('error').style.display = 'none';
        document.getElementById('weatherInfo').style.display = 'none';

        try {
            // Call your PHP backend (which uses MySQL cache + hidden API key)
            const response = await fetch(`${BACKEND_URL}?city=${encodeURIComponent(cityInput)}`);
            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error);
            }
            
            displayWeather(data);
        } catch (error) {
            showError(error.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function clearWeatherDisplay() {
        document.getElementById('city').textContent = '';
        document.getElementById('temp').textContent = '';
        document.getElementById('description').textContent = '';
        document.getElementById('humidity').textContent = '-';
        document.getElementById('wind').textContent = '-';
        document.getElementById('weatherIcon').innerHTML = '';
        document.getElementById('weatherInfo').style.display = 'none';
    }

    function displayWeather(data) {
        // data is exactly the OpenWeatherMap response (same as before)
        document.getElementById('city').textContent = data.name + ', ' + data.sys.country;
        document.getElementById('temp').textContent = Math.round(data.main.temp) + '°C';
        document.getElementById('description').textContent = data.weather[0].description;
        document.getElementById('humidity').textContent = data.main.humidity;
        document.getElementById('wind').textContent = data.wind.speed;

        // Weather icon (Font Awesome)
        const iconClass = getWeatherIcon(data.weather[0].main);
        document.getElementById('weatherIcon').innerHTML = `<i class="${iconClass}" style="font-size: 3rem;"></i>`;

        // Change background based on weather condition
        changeBackground(data.weather[0].main.toLowerCase());

        document.getElementById('weatherInfo').style.display = 'block';
    }

    function getWeatherIcon(main) {
        const map = {
            'Thunderstorm': 'fas fa-bolt',
            'Drizzle': 'fas fa-cloud-rain',
            'Rain': 'fas fa-cloud-showers-heavy',
            'Snow': 'fas fa-snowflake',
            'Clear': 'fas fa-sun',
            'Clouds': 'fas fa-cloud',
            'Mist': 'fas fa-smog',
            'Smoke': 'fas fa-smog',
            'Haze': 'fas fa-smog',
            'Dust': 'fas fa-wind',
            'Fog': 'fas fa-smog'
        };
        return map[main] || 'fas fa-cloud';
    }

    function changeBackground(weather) {
        // Remove existing classes
        document.body.className = '';
        if (weather.includes('clear')) document.body.classList.add('clear');
        else if (weather.includes('cloud')) document.body.classList.add('cloudy');
        else if (weather.includes('rain') || weather.includes('drizzle')) document.body.classList.add('rainy');
        else if (weather.includes('snow')) document.body.classList.add('snowy');
        else document.body.classList.add('clear');
    }

    function showError(msg) {
        const errorDiv = document.getElementById('error');
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 4000);
    }

    // Trigger search on Enter key
    document.getElementById('cityInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') getWeather();
    });
</script>
</body>
</html>
