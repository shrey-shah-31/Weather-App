<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - with Search History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.5s ease;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #2d3436;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 300;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background: #f8f9fa;
        }

        input[type="text"]:focus {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        button {
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00b894, #00a085);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 184, 148, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.4);
        }

        /* History Section */
        .history-section {
            margin-top: 5px;
            margin-bottom: 20px;
            text-align: left;
        }

        .history-title {
            font-size: 0.85rem;
            color: #636e72;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-item {
            background: rgba(0, 184, 148, 0.15);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #00a085;
        }

        .history-item:hover {
            background: #00b894;
            color: white;
            transform: translateY(-2px);
        }

        .clear-history {
            background: none;
            border: none;
            color: #e17055;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 2px 8px;
            box-shadow: none;
            margin-left: auto;
        }

        .clear-history:hover {
            background: rgba(225, 112, 85, 0.1);
            transform: none;
            box-shadow: none;
        }

        .weather-info {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .city { font-size: 2.5em; font-weight: 600; color: #2d3436; margin-bottom: 10px; }
        .temp { font-size: 4em; font-weight: 300; color: #2d3436; margin-bottom: 10px; }
        .weather-icon { font-size: 4em; margin-bottom: 20px; }
        .description { font-size: 1.5em; color: #636e72; margin-bottom: 30px; text-transform: capitalize; }

        .details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .detail {
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .detail i { font-size: 2em; color: #00b894; margin-bottom: 10px; }
        .detail-value { font-size: 1.5em; font-weight: 600; color: #2d3436; }
        .detail-label { color: #636e72; font-size: 0.9em; }

        .error {
            display: none;
            color: #e17055;
            font-size: 1.1em;
            margin-top: 20px;
            padding: 15px;
            background: rgba(225, 112, 85, 0.1);
            border-radius: 10px;
            border-left: 4px solid #e17055;
        }

        .loading {
            display: none;
            font-size: 1.2em;
            color: #00b894;
            margin-top: 20px;
        }

        /* Weather-based backgrounds */
        .sunny { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); }
        .cloudy { background: linear-gradient(135deg, #bdc3c7 0%, #95a5a6 100%); }
        .rainy { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }
        .snowy { background: linear-gradient(135deg, #ecf0f1 0%, #bdc3c7 100%); }
        .clear { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 2em; }
            .temp { font-size: 3em; }
            .search-box { flex-direction: column; }
        }
    </style>
</head>
<body class="clear">
    <div class="container">
        <h1><i class="fas fa-cloud-sun"></i> Weather App</h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
            <button onclick="getWeather()">
                <i class="fas fa-search"></i> Search
            </button>
        </div>

        <!-- Search History Section -->
        <div class="history-section" id="historySection">
            <div class="history-title">
                <i class="fas fa-history"></i> Recent Searches
                <button class="clear-history" onclick="clearHistory()">Clear All</button>
            </div>
            <div class="history-list" id="historyList">
                <!-- History items will appear here -->
                <span style="color: #b2bec3; font-size: 0.8rem;">No history yet</span>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <i class="fas fa-spinner fa-spin"></i> Fetching weather...
        </div>
        
        <div class="error" id="error">City not found! Please check the spelling.</div>
        
        <div class="weather-info" id="weatherInfo">
            <div class="city" id="city"></div>
            <div class="temp" id="temp"></div>
            <div class="weather-icon" id="weatherIcon"></div>
            <div class="description" id="description"></div>
            
            <div class="details">
                <div class="detail">
                    <i class="fas fa-tint"></i>
                    <div class="detail-value" id="humidity">-</div>
                    <div class="detail-label">Humidity</div>
                </div>
                <div class="detail">
                    <i class="fas fa-wind"></i>
                    <div class="detail-value" id="windSpeed">-</div>
                    <div class="detail-label">Wind Speed</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Key
        const API_KEY = '9477ed8eda5d46a0ad74324cfadc20c5';
        const API_URL = 'https://api.openweathermap.org/data/2.5/weather';

        // History storage key
        const HISTORY_KEY = 'weatherSearchHistory';
        const MAX_HISTORY = 5;

        // Load history from localStorage and display it (but DO NOT auto-search)
        function loadHistory() {
            const history = getHistory();
            displayHistory(history);
        }

        // Get history array from localStorage
        function getHistory() {
            const stored = localStorage.getItem(HISTORY_KEY);
            if (stored) {
                return JSON.parse(stored);
            }
            return [];
        }

        // Save a new city to history (avoid duplicates, keep recent on top)
        function saveToHistory(city) {
            if (!city || city.trim() === '') return;
            
            let history = getHistory();
            // Remove if already exists
            history = history.filter(item => item.toLowerCase() !== city.toLowerCase());
            // Add to beginning
            history.unshift(city);
            // Keep only MAX_HISTORY items
            if (history.length > MAX_HISTORY) history.pop();
            // Save back
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            // Refresh display
            displayHistory(history);
        }

        // Display history as clickable chips
        function displayHistory(history) {
            const historyList = document.getElementById('historyList');
            if (!historyList) return;
            
            if (history.length === 0) {
                historyList.innerHTML = '<span style="color: #b2bec3; font-size: 0.8rem;">No history yet</span>';
                return;
            }
            
            historyList.innerHTML = history.map(city => 
                `<span class="history-item" onclick="searchFromHistory('${city.replace(/'/g, "\\'")}')">
                    <i class="fas fa-search-location"></i> ${escapeHtml(city)}
                </span>`
            ).join('');
        }

        // Simple escape to prevent XSS
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Search when clicking on history item
        function searchFromHistory(city) {
            document.getElementById('cityInput').value = city;
            getWeather();
        }

        // Clear all history
        function clearHistory() {
            localStorage.removeItem(HISTORY_KEY);
            displayHistory([]);
        }

        // Clear weather display
        function clearWeatherDisplay() {
            document.getElementById('city').textContent = '';
            document.getElementById('temp').textContent = '';
            document.getElementById('description').textContent = '';
            document.getElementById('humidity').textContent = '-';
            document.getElementById('windSpeed').textContent = '-';
            document.getElementById('weatherIcon').innerHTML = '';
            document.getElementById('weatherInfo').style.display = 'none';
        }

        // Main weather fetch
        async function getWeather() {
            const cityInput = document.getElementById('cityInput').value.trim();
            
            if (!cityInput) {
                document.getElementById('error').textContent = 'Please enter a city name!';
                document.getElementById('error').style.display = 'block';
                return;
            }

            clearWeatherDisplay();
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';

            try {
                const response = await fetch(`${API_URL}?q=${encodeURIComponent(cityInput)}&appid=${API_KEY}&units=metric`);
                
                if (!response.ok) {
                    if (response.status === 401) throw new Error('Invalid API key');
                    else if (response.status === 404) throw new Error(`"${cityInput}" not found`);
                    else throw new Error('Weather service error');
                }
                
                const data = await response.json();
                displayWeather(data);
                
                // Save to history ONLY after successful search
                saveToHistory(cityInput);
                
            } catch (error) {
                document.getElementById('error').textContent = error.message;
                document.getElementById('error').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayWeather(data) {
            document.getElementById('city').textContent = data.name + ', ' + data.sys.country;
            document.getElementById('temp').textContent = Math.round(data.main.temp) + '°C';
            document.getElementById('description').textContent = data.weather[0].description;
            document.getElementById('humidity').textContent = data.main.humidity + '%';
            document.getElementById('windSpeed').textContent = data.wind.speed + ' m/s';

            const iconClass = getWeatherIcon(data.weather[0].main);
            document.getElementById('weatherIcon').innerHTML = `<i class="${iconClass}" style="font-size: 4rem;"></i>`;
            changeBackground(data.weather[0].main.toLowerCase());
            document.getElementById('weatherInfo').style.display = 'block';
        }

        function getWeatherIcon(main) {
            const map = {
                'Thunderstorm': 'fas fa-bolt', 'Drizzle': 'fas fa-cloud-rain',
                'Rain': 'fas fa-cloud-showers-heavy', 'Snow': 'fas fa-snowflake',
                'Clear': 'fas fa-sun', 'Clouds': 'fas fa-cloud',
                'Mist': 'fas fa-smog', 'Smoke': 'fas fa-smog', 'Haze': 'fas fa-smog',
                'Dust': 'fas fa-wind', 'Fog': 'fas fa-smog'
            };
            return map[main] || 'fas fa-cloud-sun';
        }

        function changeBackground(weather) {
            document.body.className = '';
            if (weather.includes('clear')) document.body.classList.add('clear');
            else if (weather.includes('cloud')) document.body.classList.add('cloudy');
            else if (weather.includes('rain') || weather.includes('drizzle')) document.body.classList.add('rainy');
            else if (weather.includes('snow')) document.body.classList.add('snowy');
            else document.body.classList.add('clear');
        }

        // On page load: load history but DO NOT auto-search any city
        window.onload = function() {
            document.getElementById('cityInput').value = '';
            clearWeatherDisplay();
            loadHistory();  // Shows history list, but does NOT search
        };

        // Enter key search
        document.getElementById('cityInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') getWeather();
        });
    </script>
</body>
</html>
